on:
  workflow_dispatch:
  # Trigger the workflow on push to master or any pull request
  # Ignore all tags
  push:
    branches:
      - master
    tags-ignore: 
      - "*"
  pull_request:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "22 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

name: 💣 Audit 💣

jobs:
  audit-check:
    runs-on: ubuntu-latest
    name: 💣 Audit 💣
    steps:
      - name: ✅ Checkout ✅
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: 💣 Audit 💣
        id: audit
        # v1
        uses: rustyhorde/audit-check@d4c2608684a8438b87769d0f0acdd802652a5ddb
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deny: 'warnings'
          create_issue: 'true'

  fuzz-smoke:
    name: 🧪 Fuzz Smoke Test 🧪
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ✅ Checkout ✅
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 🦀 Install nightly Rust 🦀
        uses: dtolnay/rust-toolchain@nightly

      - name: 📦 Install cargo-fuzz 📦
        run: cargo install cargo-fuzz

      - name: 🧪 Fuzz fuzz_frame (30 s) 🧪
        working-directory: libmoshpit
        run: cargo +nightly fuzz run fuzz_frame -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_encframe (30 s) 🧪
        working-directory: libmoshpit
        run: cargo +nightly fuzz run fuzz_encframe -- -max_total_time=30

      - name: 💾 Upload crash artifacts (if any) 💾
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: |
            libmoshpit/fuzz/artifacts/fuzz_frame/
            libmoshpit/fuzz/artifacts/fuzz_encframe/
          if-no-files-found: ignore