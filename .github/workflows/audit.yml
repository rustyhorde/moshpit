on:
  workflow_dispatch:
  # Trigger the workflow on push to master or any pull request
  # Ignore all tags
  push:
    branches:
      - master
    tags-ignore: 
      - "*"
  pull_request:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "22 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

name: 💣 Audit 💣

jobs:
  audit-check:
    runs-on: ubuntu-latest
    name: 💣 Audit 💣
    permissions:
      contents: read
      issues: write
    steps:
      - name: ✅ Checkout ✅
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 💣 Audit 💣
        # v0
        uses: rustyhorde/audit-check@f7875ca3428c17cce4d5a141ea1128568db8b6c2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deny: warnings
          create_issue: ${{ github.event_name != 'pull_request' }}

  fuzz-smoke:
    name: 🧪 Fuzz Smoke Test 🧪
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ✅ Checkout ✅
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 🦀 Install nightly Rust 🦀
        # master
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly

      - name: 📦 Install cargo-fuzz 📦
        run: cargo install cargo-fuzz

      - name: 🧪 Fuzz fuzz_frame (30 s) 🧪
        working-directory: libmoshpit
        run: cargo +nightly fuzz run fuzz_frame -- -max_total_time=30

      - name: 🧪 Fuzz fuzz_encframe (30 s) 🧪
        working-directory: libmoshpit
        run: cargo +nightly fuzz run fuzz_encframe -- -max_total_time=30

      - name: 💾 Upload crash artifacts (if any) 💾
        if: failure()
        # v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: |
            libmoshpit/fuzz/artifacts/fuzz_frame/
            libmoshpit/fuzz/artifacts/fuzz_encframe/
          if-no-files-found: ignore