on:
  push:
    tags:
      - "v[0-9]*"        # full release
      - "v[0-9]*-rc*"    # pre-release / build test only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

name: 🚀 Release 🚀

jobs:
  # ── Build release binaries ───────────────────────────────────────────────────
  build:
    name: 🔨 Build Linux Binaries 🔨
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pkgver: ${{ steps.version.outputs.pkgver }}
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.95.0"

      - name: 💾 Install (cargo-binstall) 💾
        uses: cargo-bins/cargo-binstall@1c2b96c2b86875d56caeec7b7ee9980812daf0d9 # main

      - name: 💾 Install (cross) 💾
        run: cargo binstall --no-confirm --no-symlinks --no-discover-github-token cross --version 0.2.5

      - name: Cache cargo registry
        # v5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64 cross Docker image
        run: |
          docker build \
            -t moshpit-cross-x86_64 \
            -f docker/Dockerfile.x86_64-unknown-linux-musl \
            docker/

      - name: Build x86_64-unknown-linux-musl
        env:
          VERGEN_IDEMPOTENT: "1"
        run: |
          # Standard build
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            --bin mp --bin mps --bin mp-keygen

          # Preserve standard binaries before the --features unstable build overwrites them
          cp target/x86_64-unknown-linux-musl/release/mp        mp-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mps       mps-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mp-keygen mp-keygen-x86_64-unknown-linux-musl

          # Unstable build (post-quantum ML-DSA identity key support)
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            --features unstable \
            --bin mp --bin mps --bin mp-keygen

          cp target/x86_64-unknown-linux-musl/release/mp        mp-unstable-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mps       mps-unstable-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mp-keygen mp-keygen-unstable-x86_64-unknown-linux-musl

          # mpa — passphrase only (base)
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-x86_64-unknown-linux-musl

          # mpa — FIDO2 unlock
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features fido2 \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-fido2-x86_64-unknown-linux-musl

          # mpa — systemd credentials unlock
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features systemd-creds \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-systemd-creds-x86_64-unknown-linux-musl

          # mpa — SSH agent piggyback unlock
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features ssh-agent-piggyback \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-ssh-agent-piggyback-x86_64-unknown-linux-musl

          # mpa — full (all MUSL-portable features: fido2 + systemd-creds + ssh-agent-piggyback)
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features fido2,systemd-creds,ssh-agent-piggyback \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-full-x86_64-unknown-linux-musl

          # mpa — unstable builds (post-quantum ML-DSA identity key support)
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features unstable \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-unstable-x86_64-unknown-linux-musl

          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features fido2,unstable \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-fido2-unstable-x86_64-unknown-linux-musl

          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features systemd-creds,unstable \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-systemd-creds-unstable-x86_64-unknown-linux-musl

          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features ssh-agent-piggyback,unstable \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-ssh-agent-piggyback-unstable-x86_64-unknown-linux-musl

          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features fido2,systemd-creds,ssh-agent-piggyback,unstable \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-full-unstable-x86_64-unknown-linux-musl

      - name: Build aarch64 cross Docker image
        run: |
          docker build \
            -t moshpit-cross-aarch64 \
            -f docker/Dockerfile.aarch64-unknown-linux-musl \
            docker/

      - name: Build aarch64-unknown-linux-musl
        env:
          VERGEN_IDEMPOTENT: "1"
        run: |
          # Standard build
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            --bin mp --bin mps --bin mp-keygen

          cp target/aarch64-unknown-linux-musl/release/mp        mp-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mps       mps-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mp-keygen mp-keygen-aarch64-unknown-linux-musl

          # Unstable build (post-quantum ML-DSA identity key support)
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            --features unstable \
            --bin mp --bin mps --bin mp-keygen

          cp target/aarch64-unknown-linux-musl/release/mp        mp-unstable-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mps       mps-unstable-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mp-keygen mp-keygen-unstable-aarch64-unknown-linux-musl

          # mpa — passphrase only (base)
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-aarch64-unknown-linux-musl

          # mpa — FIDO2 unlock
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features fido2 \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-fido2-aarch64-unknown-linux-musl

          # mpa — systemd credentials unlock
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features systemd-creds \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-systemd-creds-aarch64-unknown-linux-musl

          # mpa — SSH agent piggyback unlock
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features ssh-agent-piggyback \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-ssh-agent-piggyback-aarch64-unknown-linux-musl

          # mpa — full (all MUSL-portable features: fido2 + systemd-creds + ssh-agent-piggyback)
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features fido2,systemd-creds,ssh-agent-piggyback \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-full-aarch64-unknown-linux-musl

          # mpa — unstable builds (post-quantum ML-DSA identity key support)
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features unstable \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-unstable-aarch64-unknown-linux-musl

          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features fido2,unstable \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-fido2-unstable-aarch64-unknown-linux-musl

          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features systemd-creds,unstable \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-systemd-creds-unstable-aarch64-unknown-linux-musl

          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features ssh-agent-piggyback,unstable \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-ssh-agent-piggyback-unstable-aarch64-unknown-linux-musl

          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features fido2,systemd-creds,ssh-agent-piggyback,unstable \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-full-unstable-aarch64-unknown-linux-musl

      - name: Generate xtask dist artifacts
        run: |
          cargo xtask dist mp
          cargo xtask dist mps
          cargo xtask dist mp-keygen
          cargo xtask dist mpa

      - name: Create dist tarballs
        run: |
          tar -czf dist-mp.tar.gz        -C dist mp
          tar -czf dist-mps.tar.gz       -C dist mps
          tar -czf dist-mp-keygen.tar.gz -C dist mp-keygen
          tar -czf dist-mpa.tar.gz       -C dist mpa

      - name: Stage release assets
        run: |
          mkdir -p release-assets

          # x86_64 static MUSL binaries — standard
          cp mp-x86_64-unknown-linux-musl        release-assets/
          cp mps-x86_64-unknown-linux-musl       release-assets/
          cp mp-keygen-x86_64-unknown-linux-musl release-assets/

          # x86_64 static MUSL binaries — unstable (post-quantum ML-DSA support)
          cp mp-unstable-x86_64-unknown-linux-musl        release-assets/
          cp mps-unstable-x86_64-unknown-linux-musl       release-assets/
          cp mp-keygen-unstable-x86_64-unknown-linux-musl release-assets/

          # aarch64 static MUSL binaries — standard
          cp mp-aarch64-unknown-linux-musl        release-assets/
          cp mps-aarch64-unknown-linux-musl       release-assets/
          cp mp-keygen-aarch64-unknown-linux-musl release-assets/

          # aarch64 static MUSL binaries — unstable (post-quantum ML-DSA support)
          cp mp-unstable-aarch64-unknown-linux-musl        release-assets/
          cp mps-unstable-aarch64-unknown-linux-musl       release-assets/
          cp mp-keygen-unstable-aarch64-unknown-linux-musl release-assets/

          # mpa x86_64 static MUSL binaries — per-feature and full
          cp mpa-x86_64-unknown-linux-musl                    release-assets/
          cp mpa-fido2-x86_64-unknown-linux-musl              release-assets/
          cp mpa-systemd-creds-x86_64-unknown-linux-musl      release-assets/
          cp mpa-ssh-agent-piggyback-x86_64-unknown-linux-musl release-assets/
          cp mpa-full-x86_64-unknown-linux-musl               release-assets/

          # mpa aarch64 static MUSL binaries — per-feature and full
          cp mpa-aarch64-unknown-linux-musl                    release-assets/
          cp mpa-fido2-aarch64-unknown-linux-musl              release-assets/
          cp mpa-systemd-creds-aarch64-unknown-linux-musl      release-assets/
          cp mpa-ssh-agent-piggyback-aarch64-unknown-linux-musl release-assets/
          cp mpa-full-aarch64-unknown-linux-musl               release-assets/

          # mpa x86_64 static MUSL binaries — unstable (post-quantum ML-DSA support)
          cp mpa-unstable-x86_64-unknown-linux-musl                    release-assets/
          cp mpa-fido2-unstable-x86_64-unknown-linux-musl              release-assets/
          cp mpa-systemd-creds-unstable-x86_64-unknown-linux-musl      release-assets/
          cp mpa-ssh-agent-piggyback-unstable-x86_64-unknown-linux-musl release-assets/
          cp mpa-full-unstable-x86_64-unknown-linux-musl               release-assets/

          # mpa aarch64 static MUSL binaries — unstable (post-quantum ML-DSA support)
          cp mpa-unstable-aarch64-unknown-linux-musl                    release-assets/
          cp mpa-fido2-unstable-aarch64-unknown-linux-musl              release-assets/
          cp mpa-systemd-creds-unstable-aarch64-unknown-linux-musl      release-assets/
          cp mpa-ssh-agent-piggyback-unstable-aarch64-unknown-linux-musl release-assets/
          cp mpa-full-unstable-aarch64-unknown-linux-musl               release-assets/

          # dist tarballs (man pages + shell completions + licenses + example configs)
          cp dist-mp.tar.gz        release-assets/
          cp dist-mps.tar.gz       release-assets/
          cp dist-mp-keygen.tar.gz release-assets/
          cp dist-mpa.tar.gz       release-assets/

      - name: Install nfpm
        run: |
          NFPM_VERSION="2.43.0"
          curl -sSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build Debian and RPM packages
        env:
          VERSION: ${{ steps.version.outputs.pkgver }}
        run: |
          for packager in deb rpm; do
            nfpm package \
              --config packaging/nfpm/moshpit-keygen.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-keygen-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-keygen-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-keygen-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            # mpa — per-feature x86_64
            nfpm package \
              --config packaging/nfpm/moshpit-agent.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-fido2.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-systemd-creds.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-ssh-agent-piggyback.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-full.yaml \
              --packager "$packager" \
              --target release-assets/
            # mpa — per-feature aarch64
            nfpm package \
              --config packaging/nfpm/moshpit-agent-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-fido2-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-systemd-creds-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-ssh-agent-piggyback-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-full-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            # mpa — unstable per-feature x86_64
            nfpm package \
              --config packaging/nfpm/moshpit-agent-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-fido2-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-systemd-creds-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-ssh-agent-piggyback-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-full-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            # mpa — unstable per-feature aarch64
            nfpm package \
              --config packaging/nfpm/moshpit-agent-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-fido2-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-systemd-creds-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-ssh-agent-piggyback-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-full-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
          done

      - name: Upload release assets artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: release-assets/

  # ── Build macOS binaries (for Homebrew) ──────────────────────────────────────
  # Runs on every tag (including -rc) so release candidates smoke-test that the
  # client/server/keygen binaries still compile for Apple Silicon.
  build-macos:
    name: 🍎 Build macOS Binaries 🍎
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Install Rust
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        # v5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate xtask dist artifacts
        run: |
          cargo xtask dist mp
          cargo xtask dist mps
          cargo xtask dist mp-keygen

      - name: Build and bundle macOS tarballs
        env:
          VERGEN_IDEMPOTENT: "1"
        run: |
          set -euo pipefail

          # Standard build
          cargo build --release --locked \
            --target aarch64-apple-darwin \
            --bin mp --bin mps --bin mp-keygen
          cp target/aarch64-apple-darwin/release/mp        dist/mp/mp
          cp target/aarch64-apple-darwin/release/mps       dist/mps/mps
          cp target/aarch64-apple-darwin/release/mp-keygen dist/mp-keygen/mp-keygen
          tar -czf mp-aarch64-apple-darwin.tar.gz        -C dist mp
          tar -czf mps-aarch64-apple-darwin.tar.gz       -C dist mps
          tar -czf mp-keygen-aarch64-apple-darwin.tar.gz -C dist mp-keygen

          # Unstable build (post-quantum ML-DSA identity key support) — overwrites
          # the binaries in target/ and dist/, dist sidecar artifacts are identical.
          cargo build --release --locked \
            --target aarch64-apple-darwin \
            --features unstable \
            --bin mp --bin mps --bin mp-keygen
          cp target/aarch64-apple-darwin/release/mp        dist/mp/mp
          cp target/aarch64-apple-darwin/release/mps       dist/mps/mps
          cp target/aarch64-apple-darwin/release/mp-keygen dist/mp-keygen/mp-keygen
          tar -czf mp-unstable-aarch64-apple-darwin.tar.gz        -C dist mp
          tar -czf mps-unstable-aarch64-apple-darwin.tar.gz       -C dist mps
          tar -czf mp-keygen-unstable-aarch64-apple-darwin.tar.gz -C dist mp-keygen

      - name: Upload macOS release assets artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets-macos
          path: "*-aarch64-apple-darwin.tar.gz"

  # ── Create GitHub release ────────────────────────────────────────────────────
  release:
    name: 📝 Create GitHub Release 📝
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tarball_sha256: ${{ steps.sha256.outputs.tarball_sha256 }}
    steps:
      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Download macOS release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets-macos
          path: release-assets/

      - name: Download source tarball from GitHub
        run: |
          curl -sSL \
            "https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.tar.gz" \
            -o "moshpit-${{ needs.build.outputs.pkgver }}.tar.gz"

      - name: Compute source tarball sha256
        id: sha256
        run: |
          SHA=$(sha256sum "moshpit-${{ needs.build.outputs.pkgver }}.tar.gz" | awk '{print $1}')
          echo "tarball_sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        # v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
            moshpit-${{ needs.build.outputs.pkgver }}.tar.gz

  # ── Publish crates to crates.io ──────────────────────────────────────────────
  publish-crates:
    name: 📦 Publish to crates.io 📦
    if: "!contains(github.ref_name, '-rc')"
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Install Rust
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Publish crates in dependency order
        run: |
          set -euo pipefail
          # libmoshpit must land first; moshpit, moshpits, moshpit-keygen and
          # moshpit-agent depend on it by version. `cargo publish` blocks until
          # the crate is queryable, but the index can still lag for dependents,
          # so retry the dependent publishes.
          publish_with_retry() {
            local crate="$1"
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate" --locked --no-verify; then
                return 0
              fi
              echo "Publish of ${crate} attempt ${attempt} failed; waiting 30s for the index..."
              sleep 30
            done
            echo "All publish attempts for ${crate} failed."
            return 1
          }

          publish_with_retry libmoshpit
          publish_with_retry moshpit
          publish_with_retry moshpits
          publish_with_retry moshpit-keygen
          publish_with_retry moshpit-agent

  # ── Update Homebrew tap ──────────────────────────────────────────────────────
  update-homebrew:
    name: 🍺 Update Homebrew Tap 🍺
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, build-macos, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          attempt_limit: 3
          attempt_delay: 30000

      - name: Download macOS release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets-macos
          path: release-assets-macos/

      - name: Compute checksums
        id: checksums
        run: |
          cd release-assets-macos
          {
            echo "mp=$(sha256sum mp-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
            echo "mps=$(sha256sum mps-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
            echo "mp_keygen=$(sha256sum mp-keygen-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
            echo "mp_unstable=$(sha256sum mp-unstable-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
            echo "mps_unstable=$(sha256sum mps-unstable-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
            echo "mp_keygen_unstable=$(sha256sum mp-keygen-unstable-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Generate formula files
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
          MP_MACOS_SHA256: ${{ steps.checksums.outputs.mp }}
          MPS_MACOS_SHA256: ${{ steps.checksums.outputs.mps }}
          MP_KEYGEN_MACOS_SHA256: ${{ steps.checksums.outputs.mp_keygen }}
          MP_UNSTABLE_MACOS_SHA256: ${{ steps.checksums.outputs.mp_unstable }}
          MPS_UNSTABLE_MACOS_SHA256: ${{ steps.checksums.outputs.mps_unstable }}
          MP_KEYGEN_UNSTABLE_MACOS_SHA256: ${{ steps.checksums.outputs.mp_keygen_unstable }}
        run: |
          set -euo pipefail
          sed -e "s/PKGVER/${PKGVER}/g" \
              -e "s/MP_MACOS_SHA256/${MP_MACOS_SHA256}/" \
              packaging/homebrew/moshpit.rb.tmpl > moshpit.rb
          sed -e "s/PKGVER/${PKGVER}/g" \
              -e "s/MPS_MACOS_SHA256/${MPS_MACOS_SHA256}/" \
              packaging/homebrew/moshpits.rb.tmpl > moshpits.rb
          sed -e "s/PKGVER/${PKGVER}/g" \
              -e "s/MP_KEYGEN_MACOS_SHA256/${MP_KEYGEN_MACOS_SHA256}/" \
              packaging/homebrew/moshpit-keygen.rb.tmpl > moshpit-keygen.rb
          sed -e "s/PKGVER/${PKGVER}/g" \
              -e "s/MP_UNSTABLE_MACOS_SHA256/${MP_UNSTABLE_MACOS_SHA256}/" \
              packaging/homebrew/moshpit-unstable.rb.tmpl > moshpit-unstable.rb
          sed -e "s/PKGVER/${PKGVER}/g" \
              -e "s/MPS_UNSTABLE_MACOS_SHA256/${MPS_UNSTABLE_MACOS_SHA256}/" \
              packaging/homebrew/moshpits-unstable.rb.tmpl > moshpits-unstable.rb
          sed -e "s/PKGVER/${PKGVER}/g" \
              -e "s/MP_KEYGEN_UNSTABLE_MACOS_SHA256/${MP_KEYGEN_UNSTABLE_MACOS_SHA256}/" \
              packaging/homebrew/moshpit-keygen-unstable.rb.tmpl > moshpit-keygen-unstable.rb

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          set -euo pipefail

          git clone "https://oauth2:${HOMEBREW_TAP_TOKEN}@github.com/rustyhorde/homebrew-moshpit.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp moshpit.rb moshpits.rb moshpit-keygen.rb \
             moshpit-unstable.rb moshpits-unstable.rb moshpit-keygen-unstable.rb \
             /tmp/tap/Formula/
          cd /tmp/tap
          # Handle all tap repo states: normal (origin/master tracked), detached HEAD
          # (prior failed push), or empty repo (brand-new tap, first-ever push)
          if git show-ref --quiet refs/remotes/origin/master; then
            git checkout master
          elif git rev-parse HEAD 2>/dev/null; then
            git checkout -B master
          else
            git checkout --orphan master
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff-index --quiet HEAD 2>/dev/null || git commit -m "Update to v${PKGVER}"

          for attempt in 1 2 3; do
            if git push origin master; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Push attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            else
              echo "All push attempts failed."
              exit 1
            fi
          done

  # ── Publish apt/dnf package repository (GitHub Pages) ────────────────────────
  publish-packages:
    name: 📦 Publish Package Repository 📦
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Install tools
        run: sudo apt-get install -y apt-utils dpkg-dev createrepo-c

      - name: Import GPG signing key
        run: echo "${{ secrets.PACKAGES_GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Clone moshpit-packages repo
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          git clone \
            "https://oauth2:${PACKAGES_REPO_TOKEN}@github.com/rustyhorde/moshpit-packages.git" \
            /tmp/moshpit-packages
          cd /tmp/moshpit-packages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add DEB packages to APT pool
        run: |
          # Glob-copy every variant (standard, unstable, per-feature agent) — the
          # package names are distinct, so apt-ftparchive indexes them all.
          mkdir -p /tmp/moshpit-packages/apt/pool/main
          rm -f /tmp/moshpit-packages/apt/pool/main/*.deb
          cp release-assets/*_amd64.deb /tmp/moshpit-packages/apt/pool/main/
          cp release-assets/*_arm64.deb /tmp/moshpit-packages/apt/pool/main/

      - name: Add RPM packages to RPM pool
        run: |
          mkdir -p /tmp/moshpit-packages/rpm/x86_64 /tmp/moshpit-packages/rpm/aarch64
          rm -f /tmp/moshpit-packages/rpm/x86_64/*.rpm /tmp/moshpit-packages/rpm/aarch64/*.rpm
          cp release-assets/*.x86_64.rpm  /tmp/moshpit-packages/rpm/x86_64/
          cp release-assets/*.aarch64.rpm /tmp/moshpit-packages/rpm/aarch64/

      - name: Generate APT repo metadata
        env:
          PACKAGES_GPG_KEY_ID: ${{ secrets.PACKAGES_GPG_KEY_ID }}
        run: |
          cd /tmp/moshpit-packages
          mkdir -p apt/dists/stable/main/binary-amd64 apt/dists/stable/main/binary-arm64
          mkdir -p /tmp/apt-ftparchive-cache

          cat > apt-ftparchive.conf << 'APTCONF'
          Dir {
            ArchiveDir "apt";
            CacheDir "/tmp/apt-ftparchive-cache";
          };

          Default {
            Packages::Compress ". gzip xz";
          };

          BinDirectory "pool/main" {
            Packages "dists/stable/main/binary-amd64/Packages";
            Architecture "amd64";
          };

          BinDirectory "pool/main" {
            Packages "dists/stable/main/binary-arm64/Packages";
            Architecture "arm64";
          };
          APTCONF

          apt-ftparchive generate apt-ftparchive.conf

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin=moshpit \
            -o APT::FTPArchive::Release::Label=moshpit \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Codename=stable \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components=main \
            -o APT::FTPArchive::Release::Description="moshpit package repository" \
            release apt/dists/stable > apt/dists/stable/Release

          gpg --batch --yes \
            --pinentry-mode loopback \
            --local-user "$PACKAGES_GPG_KEY_ID" \
            --armor --clearsign \
            -o apt/dists/stable/InRelease \
            apt/dists/stable/Release

          gpg --batch --yes \
            --pinentry-mode loopback \
            --local-user "$PACKAGES_GPG_KEY_ID" \
            --armor --detach-sign \
            -o apt/dists/stable/Release.gpg \
            apt/dists/stable/Release

      - name: Generate RPM repo metadata
        env:
          PACKAGES_GPG_KEY_ID: ${{ secrets.PACKAGES_GPG_KEY_ID }}
        run: |
          cd /tmp/moshpit-packages
          for arch in x86_64 aarch64; do
            createrepo_c --update rpm/${arch}/
            gpg --batch --yes \
              --pinentry-mode loopback \
              --local-user "$PACKAGES_GPG_KEY_ID" \
              --armor --detach-sign \
              -o rpm/${arch}/repodata/repomd.xml.asc \
              rpm/${arch}/repodata/repomd.xml
          done

      - name: Commit and push
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          cd /tmp/moshpit-packages
          git add .
          git diff-index --quiet HEAD || git commit \
            -m "Update to v${PKGVER}"
          for attempt in 1 2 3; do
            if git push origin main; then break; fi
            if [[ $attempt -lt 3 ]]; then
              echo "Push attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            else
              echo "All push attempts failed."
              exit 1
            fi
          done

  # ── Update PKGBUILDs ─────────────────────────────────────────────────────────
  update-pkgbuilds:
    name: 📦 Update PKGBUILDs 📦
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: Wandalen/wretry.action@71a909ebf09f3ffdc6f42a17bd54ecb43481da49 # v3.8.0
        with:
          action: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          with: |
            token: ${{ secrets.GITHUB_TOKEN }}
          attempt_limit: 3
          attempt_delay: 30000

      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Compute checksums for PKGBUILDs
        id: binsums
        run: |
          # Hash release artifacts produced in this workflow so AUR PKGBUILDs are pinned
          # to the exact tarballs/binaries uploaded to the GitHub release.
          echo "x86_64_mp=$(sha256sum release-assets/mp-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mps=$(sha256sum release-assets/mps-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpkeygen=$(sha256sum release-assets/mp-keygen-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mp_unstable=$(sha256sum release-assets/mp-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mps_unstable=$(sha256sum release-assets/mps-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpkeygen_unstable=$(sha256sum release-assets/mp-keygen-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mp=$(sha256sum release-assets/mp-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mps=$(sha256sum release-assets/mps-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpkeygen=$(sha256sum release-assets/mp-keygen-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mp_unstable=$(sha256sum release-assets/mp-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mps_unstable=$(sha256sum release-assets/mps-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpkeygen_unstable=$(sha256sum release-assets/mp-keygen-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mp=$(sha256sum release-assets/dist-mp.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mps=$(sha256sum release-assets/dist-mps.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mpkeygen=$(sha256sum release-assets/dist-mp-keygen.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mpa=$(sha256sum release-assets/dist-mpa.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa=$(sha256sum release-assets/mpa-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_fido2=$(sha256sum release-assets/mpa-fido2-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_systemd_creds=$(sha256sum release-assets/mpa-systemd-creds-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_ssh_agent=$(sha256sum release-assets/mpa-ssh-agent-piggyback-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_full=$(sha256sum release-assets/mpa-full-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa=$(sha256sum release-assets/mpa-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_fido2=$(sha256sum release-assets/mpa-fido2-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_systemd_creds=$(sha256sum release-assets/mpa-systemd-creds-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_ssh_agent=$(sha256sum release-assets/mpa-ssh-agent-piggyback-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_full=$(sha256sum release-assets/mpa-full-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_unstable=$(sha256sum release-assets/mpa-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_fido2_unstable=$(sha256sum release-assets/mpa-fido2-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_systemd_creds_unstable=$(sha256sum release-assets/mpa-systemd-creds-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_ssh_agent_unstable=$(sha256sum release-assets/mpa-ssh-agent-piggyback-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_full_unstable=$(sha256sum release-assets/mpa-full-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_unstable=$(sha256sum release-assets/mpa-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_fido2_unstable=$(sha256sum release-assets/mpa-fido2-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_systemd_creds_unstable=$(sha256sum release-assets/mpa-systemd-creds-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_ssh_agent_unstable=$(sha256sum release-assets/mpa-ssh-agent-piggyback-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_full_unstable=$(sha256sum release-assets/mpa-full-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"

      - name: Update source PKGBUILDs
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
          SHA256: ${{ needs.release.outputs.tarball_sha256 }}
        run: |
          for pkg in moshpit-keygen moshpit moshpits \
                     moshpit-agent moshpit-agent-fido2 moshpit-agent-systemd-creds \
                     moshpit-agent-ssh-agent-piggyback moshpit-agent-secret-service \
                     moshpit-agent-tpm moshpit-agent-fprintd moshpit-agent-full; do
            PKGBUILD="packaging/arch/${pkg}/PKGBUILD"
            sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" "$PKGBUILD"
            sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"
            # Only the first source entry is the remote release/source tarball.
            # Local sidecar files are intentionally left as SKIP in PKGBUILDs.
            sed -i "/^sha256sums=/,/^)/ s/'[^']*'/'${SHA256}'/1" "$PKGBUILD"
          done

      - name: Update binary PKGBUILDs
        env:
          PKGVER:                     ${{ needs.build.outputs.pkgver }}
          X86_64_MP:                  ${{ steps.binsums.outputs.x86_64_mp }}
          X86_64_MPS:                 ${{ steps.binsums.outputs.x86_64_mps }}
          X86_64_MPKEYGEN:            ${{ steps.binsums.outputs.x86_64_mpkeygen }}
          X86_64_MP_UNSTABLE:         ${{ steps.binsums.outputs.x86_64_mp_unstable }}
          X86_64_MPS_UNSTABLE:        ${{ steps.binsums.outputs.x86_64_mps_unstable }}
          X86_64_MPKEYGEN_UNSTABLE:   ${{ steps.binsums.outputs.x86_64_mpkeygen_unstable }}
          AARCH64_MP:                 ${{ steps.binsums.outputs.aarch64_mp }}
          AARCH64_MPS:                ${{ steps.binsums.outputs.aarch64_mps }}
          AARCH64_MPKEYGEN:           ${{ steps.binsums.outputs.aarch64_mpkeygen }}
          AARCH64_MP_UNSTABLE:        ${{ steps.binsums.outputs.aarch64_mp_unstable }}
          AARCH64_MPS_UNSTABLE:       ${{ steps.binsums.outputs.aarch64_mps_unstable }}
          AARCH64_MPKEYGEN_UNSTABLE:  ${{ steps.binsums.outputs.aarch64_mpkeygen_unstable }}
          DIST_MP:                      ${{ steps.binsums.outputs.dist_mp }}
          DIST_MPS:                     ${{ steps.binsums.outputs.dist_mps }}
          DIST_MPKEYGEN:                ${{ steps.binsums.outputs.dist_mpkeygen }}
          DIST_MPA:                     ${{ steps.binsums.outputs.dist_mpa }}
          X86_64_MPA:                   ${{ steps.binsums.outputs.x86_64_mpa }}
          X86_64_MPA_FIDO2:             ${{ steps.binsums.outputs.x86_64_mpa_fido2 }}
          X86_64_MPA_SYSTEMD_CREDS:     ${{ steps.binsums.outputs.x86_64_mpa_systemd_creds }}
          X86_64_MPA_SSH_AGENT:         ${{ steps.binsums.outputs.x86_64_mpa_ssh_agent }}
          X86_64_MPA_FULL:              ${{ steps.binsums.outputs.x86_64_mpa_full }}
          AARCH64_MPA:                  ${{ steps.binsums.outputs.aarch64_mpa }}
          AARCH64_MPA_FIDO2:            ${{ steps.binsums.outputs.aarch64_mpa_fido2 }}
          AARCH64_MPA_SYSTEMD_CREDS:    ${{ steps.binsums.outputs.aarch64_mpa_systemd_creds }}
          AARCH64_MPA_SSH_AGENT:        ${{ steps.binsums.outputs.aarch64_mpa_ssh_agent }}
          AARCH64_MPA_FULL:             ${{ steps.binsums.outputs.aarch64_mpa_full }}
          X86_64_MPA_UNSTABLE:              ${{ steps.binsums.outputs.x86_64_mpa_unstable }}
          X86_64_MPA_FIDO2_UNSTABLE:        ${{ steps.binsums.outputs.x86_64_mpa_fido2_unstable }}
          X86_64_MPA_SYSTEMD_CREDS_UNSTABLE: ${{ steps.binsums.outputs.x86_64_mpa_systemd_creds_unstable }}
          X86_64_MPA_SSH_AGENT_UNSTABLE:    ${{ steps.binsums.outputs.x86_64_mpa_ssh_agent_unstable }}
          X86_64_MPA_FULL_UNSTABLE:         ${{ steps.binsums.outputs.x86_64_mpa_full_unstable }}
          AARCH64_MPA_UNSTABLE:             ${{ steps.binsums.outputs.aarch64_mpa_unstable }}
          AARCH64_MPA_FIDO2_UNSTABLE:       ${{ steps.binsums.outputs.aarch64_mpa_fido2_unstable }}
          AARCH64_MPA_SYSTEMD_CREDS_UNSTABLE: ${{ steps.binsums.outputs.aarch64_mpa_systemd_creds_unstable }}
          AARCH64_MPA_SSH_AGENT_UNSTABLE:   ${{ steps.binsums.outputs.aarch64_mpa_ssh_agent_unstable }}
          AARCH64_MPA_FULL_UNSTABLE:        ${{ steps.binsums.outputs.aarch64_mpa_full_unstable }}
        run: |
          # Replaces pkgver, pkgrel, and release-asset sha256 arrays in binary PKGBUILDs.
          # For sha256sums, only the first value (dist tarball) is replaced.
          # Additional local sidecar file entries remain SKIP by design.
          update_bin_pkgbuild() {
            local pb="$1" dist_hash="$2" x86_64_hash="$3" aarch64_hash="$4"
            sed -i "s/^pkgver=.*/pkgver=${PKGVER}/"                                        "$pb"
            sed -i "s/^pkgrel=.*/pkgrel=1/"                                                "$pb"
            sed -i "s/^sha256sums=('[^']*'/sha256sums=('${dist_hash}'/"                    "$pb"
            sed -i "s/^sha256sums_x86_64=('[^']*'/sha256sums_x86_64=('${x86_64_hash}'/"   "$pb"
            sed -i "s/^sha256sums_aarch64=('[^']*'/sha256sums_aarch64=('${aarch64_hash}'/" "$pb"
          }

          update_bin_pkgbuild \
            packaging/arch/moshpit-keygen-bin/PKGBUILD \
            "$DIST_MPKEYGEN" "$X86_64_MPKEYGEN" "$AARCH64_MPKEYGEN"

          update_bin_pkgbuild \
            packaging/arch/moshpit-bin/PKGBUILD \
            "$DIST_MP" "$X86_64_MP" "$AARCH64_MP"

          update_bin_pkgbuild \
            packaging/arch/moshpits-bin/PKGBUILD \
            "$DIST_MPS" "$X86_64_MPS" "$AARCH64_MPS"

          update_bin_pkgbuild \
            packaging/arch/moshpit-keygen-unstable-bin/PKGBUILD \
            "$DIST_MPKEYGEN" "$X86_64_MPKEYGEN_UNSTABLE" "$AARCH64_MPKEYGEN_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-unstable-bin/PKGBUILD \
            "$DIST_MP" "$X86_64_MP_UNSTABLE" "$AARCH64_MP_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpits-unstable-bin/PKGBUILD \
            "$DIST_MPS" "$X86_64_MPS_UNSTABLE" "$AARCH64_MPS_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA" "$AARCH64_MPA"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-full-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA_FULL" "$AARCH64_MPA_FULL"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-unstable-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA_UNSTABLE" "$AARCH64_MPA_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-fido2-unstable-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA_FIDO2_UNSTABLE" "$AARCH64_MPA_FIDO2_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-systemd-creds-unstable-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA_SYSTEMD_CREDS_UNSTABLE" "$AARCH64_MPA_SYSTEMD_CREDS_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-ssh-agent-piggyback-unstable-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA_SSH_AGENT_UNSTABLE" "$AARCH64_MPA_SSH_AGENT_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-full-unstable-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA_FULL_UNSTABLE" "$AARCH64_MPA_FULL_UNSTABLE"

      - name: Generate .SRCINFO files
        run: |
          set -euo pipefail
          for pkg_dir in packaging/arch/*/; do
            docker run --rm \
              -v "$(pwd)/${pkg_dir%/}:/pkg" \
              -w /pkg \
              archlinux:latest \
              bash -c "useradd -m builder && chown -R builder /pkg && su -s /bin/bash builder -c 'makepkg --printsrcinfo'" \
              > "${pkg_dir}.SRCINFO"
          done

      - name: Upload updated PKGBUILDs as artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pkgbuilds
          path: packaging/arch/
          include-hidden-files: true

      - name: Open PR to update PKGBUILDs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          BRANCH="chore/pkgbuild-v${PKGVER}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packaging/arch/
          git diff --cached --quiet || git commit \
            -m "chore(packaging): update PKGBUILDs to v${PKGVER}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(packaging): update PKGBUILDs to v${PKGVER}" \
            --body "Automated PKGBUILD update for release v${PKGVER}.\n\nAUR packages have already been published from this branch. Please review and merge to keep the in-tree PKGBUILDs in sync." \
            --base master \
            --head "$BRANCH"

  # ── Push to AUR ──────────────────────────────────────────────────────────────
  aur-publish:
    name: 🏹 Publish to AUR 🏹
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, update-pkgbuilds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      max-parallel: 3
      matrix:
        package:
          - moshpit-keygen
          - moshpit
          - moshpits
          - moshpit-keygen-bin
          - moshpit-bin
          - moshpits-bin
          - moshpit-keygen-unstable-bin
          - moshpit-unstable-bin
          - moshpits-unstable-bin
          - moshpit-agent
          - moshpit-agent-fido2
          - moshpit-agent-systemd-creds
          - moshpit-agent-ssh-agent-piggyback
          - moshpit-agent-secret-service
          - moshpit-agent-tpm
          - moshpit-agent-fprintd
          - moshpit-agent-full
          - moshpit-agent-bin
          - moshpit-agent-full-bin
          - moshpit-agent-unstable-bin
          - moshpit-agent-fido2-unstable-bin
          - moshpit-agent-systemd-creds-unstable-bin
          - moshpit-agent-ssh-agent-piggyback-unstable-bin
          - moshpit-agent-full-unstable-bin
    steps:
      - name: Download updated PKGBUILDs
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pkgbuilds
          path: packaging/arch/

      - name: Publish ${{ matrix.package }} to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          PKGNAME: ${{ matrix.package }}
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          set -euo pipefail

          # SSH setup — env var preserves newlines natively; no YAML parsing involved
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' >> ~/.ssh/config
          chmod 600 ~/.ssh/config

          # Clone AUR repo
          git clone "ssh://aur@aur.archlinux.org/${PKGNAME}.git" /tmp/aur-repo
          cd /tmp/aur-repo
          # Handle all AUR repo states: normal (origin/master tracked), detached HEAD
          # (prior failed push), or empty repo (brand-new package, first-ever push)
          if git show-ref --quiet refs/remotes/origin/master; then
            git checkout master
          elif git rev-parse HEAD 2>/dev/null; then
            git checkout -B master
          else
            git checkout --orphan master
          fi

          # Copy PKGBUILD and all sidecar files (including .SRCINFO generated upstream)
          PKG_DIR="${GITHUB_WORKSPACE}/packaging/arch/${PKGNAME}"
          cp "${PKG_DIR}/PKGBUILD" .
          find "${PKG_DIR}" -maxdepth 1 -type f ! -name PKGBUILD -exec cp -v {} . \;

          # Commit if there are changes
          git config user.name  "Jason Ozias"
          git config user.email "jason.g.ozias@gmail.com"
          git add .
          git diff-index --quiet HEAD 2>/dev/null || git commit -m "Update to v${PKGVER}"

          # Push with retry
          for attempt in 1 2 3; do
            if git push origin master; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Push attempt ${attempt} failed, retrying in 10s..."
              sleep 10
            else
              echo "All push attempts failed."
              exit 1
            fi
          done
