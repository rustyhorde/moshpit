on:
  push:
    tags:
      - "v[0-9]*"        # full release
      - "v[0-9]*-rc*"    # pre-release / build test only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

name: 🚀 Release 🚀

jobs:
  # ── Build release binaries ───────────────────────────────────────────────────
  build:
    name: 🔨 Build Linux Binaries 🔨
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pkgver: ${{ steps.version.outputs.pkgver }}
    steps:
      - name: Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Extract version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.91.1"

      - name: 💾 Install (cargo-binstall) 💾
        uses: cargo-bins/cargo-binstall@main

      - name: 💾 Install (cross) 💾
        run: cargo binstall --no-confirm --no-symlinks --no-discover-github-token cross --version 0.2.5

      - name: Cache cargo registry
        # v5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64 cross Docker image
        run: |
          docker build \
            -t moshpit-cross-x86_64 \
            -f docker/Dockerfile.x86_64-unknown-linux-musl \
            docker/

      - name: Build x86_64-unknown-linux-musl
        env:
          VERGEN_IDEMPOTENT: "1"
        run: |
          # Standard build
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            --bin mp --bin mps --bin mp-keygen

          # Preserve standard binaries before the --features unstable build overwrites them
          cp target/x86_64-unknown-linux-musl/release/mp        mp-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mps       mps-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mp-keygen mp-keygen-x86_64-unknown-linux-musl

          # Unstable build (post-quantum ML-DSA identity key support)
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            --features unstable \
            --bin mp --bin mps --bin mp-keygen

          cp target/x86_64-unknown-linux-musl/release/mp        mp-unstable-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mps       mps-unstable-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/mp-keygen mp-keygen-unstable-x86_64-unknown-linux-musl

          # mpa — passphrase only (base)
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-x86_64-unknown-linux-musl

          # mpa — FIDO2 unlock
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features fido2 \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-fido2-x86_64-unknown-linux-musl

          # mpa — systemd credentials unlock
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features systemd-creds \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-systemd-creds-x86_64-unknown-linux-musl

          # mpa — SSH agent piggyback unlock
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features ssh-agent-piggyback \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-ssh-agent-piggyback-x86_64-unknown-linux-musl

          # mpa — full (all MUSL-portable features: fido2 + systemd-creds + ssh-agent-piggyback)
          cross build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p moshpit-agent --features fido2,systemd-creds,ssh-agent-piggyback \
            --bin mpa
          cp target/x86_64-unknown-linux-musl/release/mpa mpa-full-x86_64-unknown-linux-musl

      - name: Build aarch64 cross Docker image
        run: |
          docker build \
            -t moshpit-cross-aarch64 \
            -f docker/Dockerfile.aarch64-unknown-linux-musl \
            docker/

      - name: Build aarch64-unknown-linux-musl
        env:
          VERGEN_IDEMPOTENT: "1"
        run: |
          # Standard build
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            --bin mp --bin mps --bin mp-keygen

          cp target/aarch64-unknown-linux-musl/release/mp        mp-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mps       mps-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mp-keygen mp-keygen-aarch64-unknown-linux-musl

          # Unstable build (post-quantum ML-DSA identity key support)
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            --features unstable \
            --bin mp --bin mps --bin mp-keygen

          cp target/aarch64-unknown-linux-musl/release/mp        mp-unstable-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mps       mps-unstable-aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/mp-keygen mp-keygen-unstable-aarch64-unknown-linux-musl

          # mpa — passphrase only (base)
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-aarch64-unknown-linux-musl

          # mpa — FIDO2 unlock
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features fido2 \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-fido2-aarch64-unknown-linux-musl

          # mpa — systemd credentials unlock
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features systemd-creds \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-systemd-creds-aarch64-unknown-linux-musl

          # mpa — SSH agent piggyback unlock
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features ssh-agent-piggyback \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-ssh-agent-piggyback-aarch64-unknown-linux-musl

          # mpa — full (all MUSL-portable features: fido2 + systemd-creds + ssh-agent-piggyback)
          cross build --release --locked \
            --target aarch64-unknown-linux-musl \
            -p moshpit-agent --features fido2,systemd-creds,ssh-agent-piggyback \
            --bin mpa
          cp target/aarch64-unknown-linux-musl/release/mpa mpa-full-aarch64-unknown-linux-musl

      - name: Generate xtask dist artifacts
        run: |
          cargo xtask dist mp
          cargo xtask dist mps
          cargo xtask dist mp-keygen
          cargo xtask dist mpa

      - name: Create dist tarballs
        run: |
          tar -czf dist-mp.tar.gz        -C dist mp
          tar -czf dist-mps.tar.gz       -C dist mps
          tar -czf dist-mp-keygen.tar.gz -C dist mp-keygen
          tar -czf dist-mpa.tar.gz       -C dist mpa

      - name: Stage release assets
        run: |
          mkdir -p release-assets

          # x86_64 static MUSL binaries — standard
          cp mp-x86_64-unknown-linux-musl        release-assets/
          cp mps-x86_64-unknown-linux-musl       release-assets/
          cp mp-keygen-x86_64-unknown-linux-musl release-assets/

          # x86_64 static MUSL binaries — unstable (post-quantum ML-DSA support)
          cp mp-unstable-x86_64-unknown-linux-musl        release-assets/
          cp mps-unstable-x86_64-unknown-linux-musl       release-assets/
          cp mp-keygen-unstable-x86_64-unknown-linux-musl release-assets/

          # aarch64 static MUSL binaries — standard
          cp mp-aarch64-unknown-linux-musl        release-assets/
          cp mps-aarch64-unknown-linux-musl       release-assets/
          cp mp-keygen-aarch64-unknown-linux-musl release-assets/

          # aarch64 static MUSL binaries — unstable (post-quantum ML-DSA support)
          cp mp-unstable-aarch64-unknown-linux-musl        release-assets/
          cp mps-unstable-aarch64-unknown-linux-musl       release-assets/
          cp mp-keygen-unstable-aarch64-unknown-linux-musl release-assets/

          # mpa x86_64 static MUSL binaries — per-feature and full
          cp mpa-x86_64-unknown-linux-musl                    release-assets/
          cp mpa-fido2-x86_64-unknown-linux-musl              release-assets/
          cp mpa-systemd-creds-x86_64-unknown-linux-musl      release-assets/
          cp mpa-ssh-agent-piggyback-x86_64-unknown-linux-musl release-assets/
          cp mpa-full-x86_64-unknown-linux-musl               release-assets/

          # mpa aarch64 static MUSL binaries — per-feature and full
          cp mpa-aarch64-unknown-linux-musl                    release-assets/
          cp mpa-fido2-aarch64-unknown-linux-musl              release-assets/
          cp mpa-systemd-creds-aarch64-unknown-linux-musl      release-assets/
          cp mpa-ssh-agent-piggyback-aarch64-unknown-linux-musl release-assets/
          cp mpa-full-aarch64-unknown-linux-musl               release-assets/

          # dist tarballs (man pages + shell completions + licenses + example configs)
          cp dist-mp.tar.gz        release-assets/
          cp dist-mps.tar.gz       release-assets/
          cp dist-mp-keygen.tar.gz release-assets/
          cp dist-mpa.tar.gz       release-assets/

      - name: Install nfpm
        run: |
          NFPM_VERSION="2.43.0"
          curl -sSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build Debian and RPM packages
        env:
          VERSION: ${{ steps.version.outputs.pkgver }}
        run: |
          for packager in deb rpm; do
            nfpm package \
              --config packaging/nfpm/moshpit-keygen.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-keygen-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits-unstable.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-keygen-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-keygen-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpits-unstable-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            # mpa — per-feature x86_64
            nfpm package \
              --config packaging/nfpm/moshpit-agent.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-fido2.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-systemd-creds.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-ssh-agent-piggyback.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-full.yaml \
              --packager "$packager" \
              --target release-assets/
            # mpa — per-feature aarch64
            nfpm package \
              --config packaging/nfpm/moshpit-agent-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-fido2-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-systemd-creds-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-ssh-agent-piggyback-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
            nfpm package \
              --config packaging/nfpm/moshpit-agent-full-aarch64.yaml \
              --packager "$packager" \
              --target release-assets/
          done

      - name: Upload release assets artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-assets
          path: release-assets/

  # ── Create GitHub release ────────────────────────────────────────────────────
  release:
    name: 📝 Create GitHub Release 📝
    if: "!contains(github.ref_name, '-rc')"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tarball_sha256: ${{ steps.sha256.outputs.tarball_sha256 }}
    steps:
      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Download source tarball from GitHub
        run: |
          curl -sSL \
            "https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.tar.gz" \
            -o "moshpit-${{ needs.build.outputs.pkgver }}.tar.gz"

      - name: Compute source tarball sha256
        id: sha256
        run: |
          SHA=$(sha256sum "moshpit-${{ needs.build.outputs.pkgver }}.tar.gz" | awk '{print $1}')
          echo "tarball_sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        # v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
            moshpit-${{ needs.build.outputs.pkgver }}.tar.gz

  # ── Update PKGBUILDs ─────────────────────────────────────────────────────────
  update-pkgbuilds:
    name: 📦 Update PKGBUILDs 📦
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release assets
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-assets
          path: release-assets/

      - name: Compute checksums for PKGBUILDs
        id: binsums
        run: |
          # Hash release artifacts produced in this workflow so AUR PKGBUILDs are pinned
          # to the exact tarballs/binaries uploaded to the GitHub release.
          echo "x86_64_mp=$(sha256sum release-assets/mp-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mps=$(sha256sum release-assets/mps-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpkeygen=$(sha256sum release-assets/mp-keygen-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mp_unstable=$(sha256sum release-assets/mp-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mps_unstable=$(sha256sum release-assets/mps-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpkeygen_unstable=$(sha256sum release-assets/mp-keygen-unstable-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mp=$(sha256sum release-assets/mp-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mps=$(sha256sum release-assets/mps-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpkeygen=$(sha256sum release-assets/mp-keygen-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mp_unstable=$(sha256sum release-assets/mp-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mps_unstable=$(sha256sum release-assets/mps-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpkeygen_unstable=$(sha256sum release-assets/mp-keygen-unstable-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mp=$(sha256sum release-assets/dist-mp.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mps=$(sha256sum release-assets/dist-mps.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mpkeygen=$(sha256sum release-assets/dist-mp-keygen.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "dist_mpa=$(sha256sum release-assets/dist-mpa.tar.gz | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa=$(sha256sum release-assets/mpa-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_fido2=$(sha256sum release-assets/mpa-fido2-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_systemd_creds=$(sha256sum release-assets/mpa-systemd-creds-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_ssh_agent=$(sha256sum release-assets/mpa-ssh-agent-piggyback-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "x86_64_mpa_full=$(sha256sum release-assets/mpa-full-x86_64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa=$(sha256sum release-assets/mpa-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_fido2=$(sha256sum release-assets/mpa-fido2-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_systemd_creds=$(sha256sum release-assets/mpa-systemd-creds-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_ssh_agent=$(sha256sum release-assets/mpa-ssh-agent-piggyback-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"
          echo "aarch64_mpa_full=$(sha256sum release-assets/mpa-full-aarch64-unknown-linux-musl | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"

      - name: Update source PKGBUILDs
        env:
          PKGVER: ${{ needs.build.outputs.pkgver }}
          SHA256: ${{ needs.release.outputs.tarball_sha256 }}
        run: |
          for pkg in moshpit-keygen moshpit moshpits \
                     moshpit-agent moshpit-agent-fido2 moshpit-agent-systemd-creds \
                     moshpit-agent-ssh-agent-piggyback moshpit-agent-secret-service \
                     moshpit-agent-tpm moshpit-agent-fprintd moshpit-agent-full; do
            PKGBUILD="packaging/arch/${pkg}/PKGBUILD"
            sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" "$PKGBUILD"
            sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"
            # Only the first source entry is the remote release/source tarball.
            # Local sidecar files are intentionally left as SKIP in PKGBUILDs.
            sed -i "/^sha256sums=/,/^)/ s/'[^']*'/'${SHA256}'/1" "$PKGBUILD"
          done

      - name: Update binary PKGBUILDs
        env:
          PKGVER:                     ${{ needs.build.outputs.pkgver }}
          X86_64_MP:                  ${{ steps.binsums.outputs.x86_64_mp }}
          X86_64_MPS:                 ${{ steps.binsums.outputs.x86_64_mps }}
          X86_64_MPKEYGEN:            ${{ steps.binsums.outputs.x86_64_mpkeygen }}
          X86_64_MP_UNSTABLE:         ${{ steps.binsums.outputs.x86_64_mp_unstable }}
          X86_64_MPS_UNSTABLE:        ${{ steps.binsums.outputs.x86_64_mps_unstable }}
          X86_64_MPKEYGEN_UNSTABLE:   ${{ steps.binsums.outputs.x86_64_mpkeygen_unstable }}
          AARCH64_MP:                 ${{ steps.binsums.outputs.aarch64_mp }}
          AARCH64_MPS:                ${{ steps.binsums.outputs.aarch64_mps }}
          AARCH64_MPKEYGEN:           ${{ steps.binsums.outputs.aarch64_mpkeygen }}
          AARCH64_MP_UNSTABLE:        ${{ steps.binsums.outputs.aarch64_mp_unstable }}
          AARCH64_MPS_UNSTABLE:       ${{ steps.binsums.outputs.aarch64_mps_unstable }}
          AARCH64_MPKEYGEN_UNSTABLE:  ${{ steps.binsums.outputs.aarch64_mpkeygen_unstable }}
          DIST_MP:                      ${{ steps.binsums.outputs.dist_mp }}
          DIST_MPS:                     ${{ steps.binsums.outputs.dist_mps }}
          DIST_MPKEYGEN:                ${{ steps.binsums.outputs.dist_mpkeygen }}
          DIST_MPA:                     ${{ steps.binsums.outputs.dist_mpa }}
          X86_64_MPA:                   ${{ steps.binsums.outputs.x86_64_mpa }}
          X86_64_MPA_FIDO2:             ${{ steps.binsums.outputs.x86_64_mpa_fido2 }}
          X86_64_MPA_SYSTEMD_CREDS:     ${{ steps.binsums.outputs.x86_64_mpa_systemd_creds }}
          X86_64_MPA_SSH_AGENT:         ${{ steps.binsums.outputs.x86_64_mpa_ssh_agent }}
          X86_64_MPA_FULL:              ${{ steps.binsums.outputs.x86_64_mpa_full }}
          AARCH64_MPA:                  ${{ steps.binsums.outputs.aarch64_mpa }}
          AARCH64_MPA_FIDO2:            ${{ steps.binsums.outputs.aarch64_mpa_fido2 }}
          AARCH64_MPA_SYSTEMD_CREDS:    ${{ steps.binsums.outputs.aarch64_mpa_systemd_creds }}
          AARCH64_MPA_SSH_AGENT:        ${{ steps.binsums.outputs.aarch64_mpa_ssh_agent }}
          AARCH64_MPA_FULL:             ${{ steps.binsums.outputs.aarch64_mpa_full }}
        run: |
          # Replaces pkgver, pkgrel, and release-asset sha256 arrays in binary PKGBUILDs.
          # For sha256sums, only the first value (dist tarball) is replaced.
          # Additional local sidecar file entries remain SKIP by design.
          update_bin_pkgbuild() {
            local pb="$1" dist_hash="$2" x86_64_hash="$3" aarch64_hash="$4"
            sed -i "s/^pkgver=.*/pkgver=${PKGVER}/"                                        "$pb"
            sed -i "s/^pkgrel=.*/pkgrel=1/"                                                "$pb"
            sed -i "s/^sha256sums=('[^']*'/sha256sums=('${dist_hash}'/"                    "$pb"
            sed -i "s/^sha256sums_x86_64=('[^']*'/sha256sums_x86_64=('${x86_64_hash}'/"   "$pb"
            sed -i "s/^sha256sums_aarch64=('[^']*'/sha256sums_aarch64=('${aarch64_hash}'/" "$pb"
          }

          update_bin_pkgbuild \
            packaging/arch/moshpit-keygen-bin/PKGBUILD \
            "$DIST_MPKEYGEN" "$X86_64_MPKEYGEN" "$AARCH64_MPKEYGEN"

          update_bin_pkgbuild \
            packaging/arch/moshpit-bin/PKGBUILD \
            "$DIST_MP" "$X86_64_MP" "$AARCH64_MP"

          update_bin_pkgbuild \
            packaging/arch/moshpits-bin/PKGBUILD \
            "$DIST_MPS" "$X86_64_MPS" "$AARCH64_MPS"

          update_bin_pkgbuild \
            packaging/arch/moshpit-keygen-unstable-bin/PKGBUILD \
            "$DIST_MPKEYGEN" "$X86_64_MPKEYGEN_UNSTABLE" "$AARCH64_MPKEYGEN_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-unstable-bin/PKGBUILD \
            "$DIST_MP" "$X86_64_MP_UNSTABLE" "$AARCH64_MP_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpits-unstable-bin/PKGBUILD \
            "$DIST_MPS" "$X86_64_MPS_UNSTABLE" "$AARCH64_MPS_UNSTABLE"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA" "$AARCH64_MPA"

          update_bin_pkgbuild \
            packaging/arch/moshpit-agent-full-bin/PKGBUILD \
            "$DIST_MPA" "$X86_64_MPA_FULL" "$AARCH64_MPA_FULL"

      - name: Upload updated PKGBUILDs as artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pkgbuilds
          path: packaging/arch/

      - name: Open PR to update PKGBUILDs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKGVER: ${{ needs.build.outputs.pkgver }}
        run: |
          BRANCH="chore/pkgbuild-v${PKGVER}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packaging/arch/
          git diff --cached --quiet || git commit \
            -m "chore(packaging): update PKGBUILDs to v${PKGVER}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(packaging): update PKGBUILDs to v${PKGVER}" \
            --body "Automated PKGBUILD update for release v${PKGVER}.\n\nAUR packages have already been published from this branch. Please review and merge to keep the in-tree PKGBUILDs in sync." \
            --base master \
            --head "$BRANCH"

  # ── Push to AUR ──────────────────────────────────────────────────────────────
  aur-publish:
    name: 🏹 Publish to AUR 🏹
    if: "!contains(github.ref_name, '-rc')"
    needs: [build, update-pkgbuilds]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        package:
          - moshpit-keygen
          - moshpit
          - moshpits
          - moshpit-keygen-bin
          - moshpit-bin
          - moshpits-bin
          - moshpit-keygen-unstable-bin
          - moshpit-unstable-bin
          - moshpits-unstable-bin
          - moshpit-agent
          - moshpit-agent-fido2
          - moshpit-agent-systemd-creds
          - moshpit-agent-ssh-agent-piggyback
          - moshpit-agent-secret-service
          - moshpit-agent-tpm
          - moshpit-agent-fprintd
          - moshpit-agent-full
          - moshpit-agent-bin
          - moshpit-agent-full-bin
    steps:
      - name: Download updated PKGBUILDs
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pkgbuilds
          path: packaging/arch/

      - name: Collect flat package assets
        id: assets
        run: |
          pkg_dir="packaging/arch/${{ matrix.package }}"
          {
            # Include only regular files in package root (no subdirectories).
            find "$pkg_dir" -maxdepth 1 -type f ! -name 'PKGBUILD' | sort
          } > assets.txt
          {
            echo "assets<<EOF"
            cat assets.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish ${{ matrix.package }} to AUR
        # v4.1.3
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7
        with:
          pkgname: ${{ matrix.package }}
          pkgbuild: packaging/arch/${{ matrix.package }}/PKGBUILD
          assets: ${{ steps.assets.outputs.assets }}
          commit_username: "Jason Ozias"
          commit_email: "jason.g.ozias@gmail.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ needs.build.outputs.pkgver }}"
          allow_empty_commits: false
