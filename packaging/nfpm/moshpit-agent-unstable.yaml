# nfpm package configuration for moshpit-agent-unstable (passphrase unlock + post-quantum, x86_64)
# Build with: VERSION=<ver> nfpm package --config packaging/nfpm/moshpit-agent-unstable.yaml --packager deb|rpm --target release-assets/
name: moshpit-agent-unstable
arch: amd64
version: ${VERSION}
version_schema: semver
section: net
maintainer: Jason Ozias <jason.g.ozias@gmail.com>
description: |
  Moshpit agent daemon — passphrase unlock with post-quantum ML-DSA support.
  Holds decrypted identity keys in memory and serves signing and public-key
  requests to mp over a Unix socket so passphrases are only entered once.
  Includes ML-DSA-65 post-quantum identity key support.
homepage: https://github.com/rustyhorde/moshpit
license: MIT OR Apache-2.0

conflicts:
  - moshpit-agent
  - moshpit-agent-fido2
  - moshpit-agent-systemd-creds
  - moshpit-agent-ssh-agent-piggyback
  - moshpit-agent-full
  - moshpit-agent-fido2-unstable
  - moshpit-agent-systemd-creds-unstable
  - moshpit-agent-ssh-agent-piggyback-unstable
  - moshpit-agent-full-unstable

deb:
  compression: xz

rpm:
  compression: xz

contents:
  # Binary
  - src: mpa-unstable-x86_64-unknown-linux-musl
    dst: /usr/bin/mpa
    file_info:
      mode: 0755

  # Man page
  - src: dist/mpa/mpa.1
    dst: /usr/share/man/man1/mpa.1

  # Shell completions
  - src: dist/mpa/mpa.bash
    dst: /usr/share/bash-completion/completions/mpa

  - src: dist/mpa/_mpa
    dst: /usr/share/zsh/vendor-completions/_mpa

  - src: dist/mpa/mpa.fish
    dst: /usr/share/fish/vendor_completions.d/mpa.fish

  # systemd user units
  - src: dist/mpa/moshpit-agent.service
    dst: /usr/lib/systemd/user/moshpit-agent.service

  - src: dist/mpa/moshpit-agent.socket
    dst: /usr/lib/systemd/user/moshpit-agent.socket

  # Licenses
  - src: dist/mpa/LICENSE-MIT
    dst: /usr/share/doc/moshpit-agent-unstable/LICENSE-MIT

  - src: dist/mpa/LICENSE-APACHE
    dst: /usr/share/doc/moshpit-agent-unstable/LICENSE-APACHE
