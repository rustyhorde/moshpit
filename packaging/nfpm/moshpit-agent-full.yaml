# nfpm package configuration for moshpit-agent-full (all MUSL-portable unlock backends, x86_64)
# Build with: VERSION=<ver> nfpm package --config packaging/nfpm/moshpit-agent-full.yaml --packager deb|rpm --target release-assets/
name: moshpit-agent-full
arch: amd64
version: ${VERSION}
version_schema: semver
section: net
maintainer: Jason Ozias <jason.g.ozias@gmail.com>
description: |
  Moshpit agent daemon — all MUSL-portable unlock backends.
  Includes: passphrase, FIDO2, systemd credentials, and SSH agent piggyback.
  Holds decrypted identity keys in memory and serves signing and public-key
  requests to mp over a Unix socket.
homepage: https://github.com/rustyhorde/moshpit
license: MIT OR Apache-2.0

deb:
  compression: xz
  conflicts:
    - moshpit-agent
    - moshpit-agent-fido2
    - moshpit-agent-systemd-creds
    - moshpit-agent-ssh-agent-piggyback

rpm:
  compression: xz

contents:
  - src: mpa-full-x86_64-unknown-linux-musl
    dst: /usr/bin/mpa
    file_info:
      mode: 0755

  - src: dist/mpa/mpa.1
    dst: /usr/share/man/man1/mpa.1

  - src: dist/mpa/mpa.bash
    dst: /usr/share/bash-completion/completions/mpa

  - src: dist/mpa/_mpa
    dst: /usr/share/zsh/vendor-completions/_mpa

  - src: dist/mpa/mpa.fish
    dst: /usr/share/fish/vendor_completions.d/mpa.fish

  - src: dist/mpa/moshpit-agent.service
    dst: /usr/lib/systemd/user/moshpit-agent.service

  - src: dist/mpa/moshpit-agent.socket
    dst: /usr/lib/systemd/user/moshpit-agent.socket

  - src: dist/mpa/LICENSE-MIT
    dst: /usr/share/doc/moshpit-agent-full/LICENSE-MIT

  - src: dist/mpa/LICENSE-APACHE
    dst: /usr/share/doc/moshpit-agent-full/LICENSE-APACHE
