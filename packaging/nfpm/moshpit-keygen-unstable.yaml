# nfpm package configuration for moshpit-keygen-unstable (post-quantum)
# Build with: VERSION=<ver> nfpm package --config packaging/nfpm/moshpit-keygen-unstable.yaml --packager deb|rpm --target release-assets/
name: moshpit-keygen-unstable
arch: amd64
version: ${VERSION}
version_schema: semver
section: net
maintainer: Jason Ozias <jason.g.ozias@gmail.com>
description: |
  Asymmetric key generation and inspection tool for moshpit — with post-quantum support.
  Generates and manages the key pairs used by both the moshpit client and the moshpits server
  for mutual authentication. Supports X25519, P-384, P-256, and ML-DSA-65 identity key types.
homepage: https://github.com/rustyhorde/moshpit
license: MIT OR Apache-2.0

conflicts:
  - moshpit-keygen

replaces:
  - moshpit-keygen

provides:
  - moshpit-keygen

deb:
  compression: xz

rpm:
  compression: xz

overrides:
  deb:
    scripts:
      preinstall: packaging/nfpm/scripts/moshpit-keygen-unstable-preinst
  rpm:
    scripts:
      preinstall: packaging/nfpm/scripts/moshpit-keygen-unstable-rpm-preinst

contents:
  # Binary
  - src: mp-keygen-unstable-x86_64-unknown-linux-musl
    dst: /usr/bin/mp-keygen
    file_info:
      mode: 0755

  # Man page
  - src: dist/mp-keygen/mp-keygen.1
    dst: /usr/share/man/man1/mp-keygen.1

  # Shell completions
  - src: dist/mp-keygen/mp-keygen.bash
    dst: /usr/share/bash-completion/completions/mp-keygen

  - src: dist/mp-keygen/_mp-keygen
    dst: /usr/share/zsh/vendor-completions/_mp-keygen

  - src: dist/mp-keygen/mp-keygen.fish
    dst: /usr/share/fish/vendor_completions.d/mp-keygen.fish

  # Licenses
  - src: dist/mp-keygen/LICENSE-MIT
    dst: /usr/share/doc/moshpit-keygen-unstable/LICENSE-MIT

  - src: dist/mp-keygen/LICENSE-APACHE
    dst: /usr/share/doc/moshpit-keygen-unstable/LICENSE-APACHE
