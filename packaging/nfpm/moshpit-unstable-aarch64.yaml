# nfpm package configuration for moshpit-unstable (client, arm64, post-quantum)
# Build with: VERSION=<ver> nfpm package --config packaging/nfpm/moshpit-unstable-aarch64.yaml --packager deb|rpm --target release-assets/
name: moshpit-unstable
arch: arm64
version: ${VERSION}
version_schema: semver
section: net
maintainer: Jason Ozias <jason.g.ozias@gmail.com>
description: |
  moshpit client with post-quantum support — SSH and Mosh inspired remote terminal client.
  Connects to a moshpits server over an encrypted channel using asymmetric mutual
  authentication and AES-256-GCM-SIV UDP transport. Includes ML-DSA-65 post-quantum
  identity key support.
homepage: https://github.com/rustyhorde/moshpit
license: MIT OR Apache-2.0

conflicts:
  - moshpit

replaces:
  - moshpit

provides:
  - moshpit

deb:
  compression: xz

rpm:
  compression: xz

contents:
  # Binary
  - src: mp-unstable-aarch64-unknown-linux-musl
    dst: /usr/bin/mp
    file_info:
      mode: 0755

  # Man page
  - src: dist/mp/mp.1
    dst: /usr/share/man/man1/mp.1

  # Shell completions
  - src: dist/mp/mp.bash
    dst: /usr/share/bash-completion/completions/mp

  - src: dist/mp/_mp
    dst: /usr/share/zsh/vendor-completions/_mp

  - src: dist/mp/mp.fish
    dst: /usr/share/fish/vendor_completions.d/mp.fish

  # Example configuration
  - src: dist/mp/moshpit.toml.example
    dst: /usr/share/doc/moshpit-unstable/examples/moshpit.toml.example

  # Licenses
  - src: dist/mp/LICENSE-MIT
    dst: /usr/share/doc/moshpit-unstable/LICENSE-MIT

  - src: dist/mp/LICENSE-APACHE
    dst: /usr/share/doc/moshpit-unstable/LICENSE-APACHE
